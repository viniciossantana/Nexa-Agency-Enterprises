<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="navicon.png" type="image/png">

<title>Nexa • Recuperar Senha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050714;
--bg2:#090d1f;

--blue:#00bfff;
--purple:#8b2cff;
--purple-soft:#b46cff;

--text:#ffffff;
--muted:#a8afc6;

--card:rgba(255,255,255,.04);
--border:rgba(255,255,255,.08);

--radius:26px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,rgba(0,191,255,.10),transparent 40%),
radial-gradient(circle at bottom right,rgba(139,44,255,.18),transparent 45%),
linear-gradient(180deg,var(--bg),var(--bg2));

color:white;
overflow:hidden;
}

/* CARD PRINCIPAL */
.recovery-card{
width:min(92%,440px);

padding:42px 38px;

border-radius:34px;

background:var(--card);
border:1px solid var(--border);

backdrop-filter:blur(22px);

box-shadow:0 25px 80px rgba(0,0,0,.55);

position:relative;
overflow:hidden;
}

/* GLOW */
.recovery-card::before{
content:"";
position:absolute;
top:-120px;
right:-120px;

width:260px;
height:260px;

background:radial-gradient(circle,rgba(139,44,255,.25),transparent 70%);
filter:blur(20px);
}

.recovery-card::after{
content:"";
position:absolute;
bottom:-140px;
left:-140px;

width:280px;
height:280px;

background:radial-gradient(circle,rgba(0,191,255,.18),transparent 70%);
filter:blur(20px);
}

.span{
display:block;
text-align:center;
font-size:1.2rem;
font-weight:700;
margin-bottom:6px;
color:var(--purple);
}

h1{
text-align:center;
font-size:1.8rem;
margin-bottom:10px;
}

p{
text-align:center;
color:var(--muted);
font-size:.95rem;
line-height:1.6;
margin-bottom:28px;
}

/* INPUT */
.input-group{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:18px;
}

label{
font-size:.85rem;
color:var(--muted);
}

input{
padding:14px 16px;

border-radius:16px;

border:1px solid var(--border);

background:rgba(255,255,255,.03);

color:white;

outline:none;

transition:.3s;
}

input:focus{
border-color:var(--purple);
box-shadow:0 0 0 3px rgba(139,44,255,.15);
}

/* BOTÃO */
button{
width:100%;

padding:15px;

border:none;

border-radius:999px;

cursor:pointer;

font-weight:700;

color:white;

background:linear-gradient(135deg,var(--blue),var(--purple));

box-shadow:0 0 25px rgba(139,44,255,.25);

transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

/* LINK */
.back{
margin-top:18px;
text-align:center;
font-size:.85rem;
color:var(--muted);
}

.back a{
color:white;
text-decoration:none;
font-weight:600;
}

.back a:hover{
color:var(--purple-soft);
}

/* SUCESSO */
.success{
display:none;
margin-top:18px;

text-align:center;
font-size:.9rem;

color:#4ade80;
}

</style>

</head>

<body>

<div class="recovery-card">

  <span>NEXA ENTERPRISES</span>

  <h1>Recuperar senha</h1>

  <p>
    Digite seu e-mail e o sistema vai enviar um link seguro pra você renascer o acesso.
  </p>

  <div class="input-group">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seuemail@nexa.com">
  </div>

  <button onclick="send()">Enviar link</button>

  <div class="success" id="success">
    Se existir conta, o link foi enviado.
  </div>

  <div class="back">
    Lembrou a senha? <a href="login.html">Voltar ao login</a>
  </div>

</div>

<script>
function send(){
const email = document.getElementById("email").value;
const success = document.getElementById("success");

if(!email){
alert("Digite um e-mail válido.");
return;
}

success.style.display = "block";
}
</script>

</body>
</html>
